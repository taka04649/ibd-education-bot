name: IBD Education Daily Digest (4 times/day)

on:
  schedule:
    # 1日4回投稿（すべて UTC 指定、JST は +9時間）
    - cron: '0 22 * * *'   # UTC 22:00 = JST 07:00（朝）
    - cron: '0 3 * * *'    # UTC 03:00 = JST 12:00（昼）
    - cron: '0 9 * * *'    # UTC 09:00 = JST 18:00（夕）
    - cron: '0 13 * * *'   # UTC 13:00 = JST 22:00（夜）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # 並行実行を禁止（同時トリガーで state が壊れないように）
    concurrency:
      group: ibd-education-bot
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL }}
        run: python src/main.py

      - name: Pull latest before commit
        run: |
          git pull --rebase origin ${GITHUB_REF_NAME} || true

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_pmids.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update posted PMIDs [skip ci]"
            git push
          fi
